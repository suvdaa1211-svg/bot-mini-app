<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Бүртгэл</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    .app {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: #ffffff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 24px;
      text-align: center;
    }

    .subtitle {
      margin: 0 0 20px 0;
      font-size: 14px;
      color: #6b7280;
      text-align: center;
      line-height: 1.5;
    }

    .hidden {
      display: none;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
    }

    .btn-primary {
      background: #2563eb;
      color: #fff;
    }

    .btn-secondary {
      background: #10b981;
      color: #fff;
    }

    .btn-light {
      background: #e5e7eb;
      color: #111827;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 10px 0;
      text-align: center;
    }

    .description {
      font-size: 14px;
      line-height: 1.6;
      color: #4b5563;
      text-align: center;
      margin-bottom: 16px;
    }

    #reader {
      width: 100%;
      overflow: hidden;
      border-radius: 12px;
      margin-top: 12px;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      margin-top: 14px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      resize: vertical;
      font-size: 14px;
    }

    .status {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      background: #eff6ff;
      color: #1d4ed8;
      text-align: center;
    }

    .small {
      margin-top: 10px;
      font-size: 12px;
      color: #6b7280;
      line-height: 1.5;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <!-- HOME VIEW -->
      <div id="homeView">
        <h1>Бүртгэлийн хэсэг</h1>
        <p class="subtitle">
          Доорх сонголтоос өөрт тохирох үйлдлийг сонгоно уу.
        </p>

        <button id="btnManual" class="btn btn-primary">
          Хүний мэдээлэл бүртгэх
        </button>

        <button id="btnQr" class="btn btn-secondary">
          Цахим үнэмлэх уншуулах
        </button>
      </div>

      <!-- QR VIEW -->
      <div id="qrView" class="hidden">
        <div class="section-title">Цахим үнэмлэх уншуулах</div>

        <div class="description">
          Та цахим үнэмлэхний ард байрлах QR кодыг уншуулна уу.
        </div>

        <button id="btnStartScan" class="btn btn-primary">
          QR уншиж эхлэх
        </button>

        <button id="btnStopScan" class="btn btn-light">
          Уншилт зогсоох
        </button>

        <div id="reader"></div>

        <textarea
          id="result"
          placeholder="QR-ээс уншсан raw текст энд харагдана"
        ></textarea>

        <div id="statusBox" class="status hidden"></div>

        <button id="btnBack" class="btn btn-light">
          Буцах
        </button>

        <div class="small">
          QR амжилттай уншигдмагц мэдээллийг форм руу дамжуулан нээнэ.
        </div>
      </div>
    </div>
  </div>

  <script>
    const MANUAL_FORM_URL = "https://tally.so/r/81G1E5";
    const TALLY_FORM_URL = "https://tally.so/r/44L4pA";

    /*
      Tally form дээр raw QR текст хүлээж авах field-ийн query parameter нэр.
      Жишээ нь:
      https://bbbb.com?qr_raw_text=...
      Та Tally дээрээ энэ нэртэй талбартай тааруулж ашиглана.
    */
    const TALLY_QR_PARAM_NAME = "qr_value";

    /*
      Хэрэв Tally form дээр scan_type гэх мэт нэмэлт hidden/prefill variable дамжуулах бол:
      const EXTRA_PARAMS = {
        source: "telegram-mini-app",
        scan_type: "citizen-id"
      };
    */
    const EXTRA_PARAMS = {
      source: "telegram-mini-app",
      scan_type: "citizen-id"
    };

    let scanner = null;
    let scannedText = "";

    const tg = window.Telegram?.WebApp;

    if (tg) {
      tg.ready();
      tg.expand();
    }

    const homeView = document.getElementById("homeView");
    const qrView = document.getElementById("qrView");
    const resultEl = document.getElementById("result");
    const statusBox = document.getElementById("statusBox");

    const btnManual = document.getElementById("btnManual");
    const btnQr = document.getElementById("btnQr");
    const btnStartScan = document.getElementById("btnStartScan");
    const btnStopScan = document.getElementById("btnStopScan");
    const btnBack = document.getElementById("btnBack");

    function showHome() {
      homeView.classList.remove("hidden");
      qrView.classList.add("hidden");
      hideStatus();
      stopScanner();
    }

    function showQrView() {
      homeView.classList.add("hidden");
      qrView.classList.remove("hidden");
      hideStatus();
      resultEl.value = "";
      scannedText = "";
    }

    function showStatus(message) {
      statusBox.textContent = message;
      statusBox.classList.remove("hidden");
    }

    function hideStatus() {
      statusBox.textContent = "";
      statusBox.classList.add("hidden");
    }

    function buildTallyUrl(rawQrText) {
      const url = new URL(TALLY_FORM_URL);

      url.searchParams.set(TALLY_QR_PARAM_NAME, rawQrText);

      Object.entries(EXTRA_PARAMS).forEach(([key, value]) => {
        url.searchParams.set(key, value);
      });

      return url.toString();
    }

    async function startScanner() {
      hideStatus();

      if (scanner) {
        showStatus("QR уншигч аль хэдийн ажиллаж байна.");
        return;
      }

      try {
        scanner = new Html5Qrcode("reader");

        await scanner.start(
          { facingMode: "environment" },
          {
            fps: 10,
            qrbox: { width: 220, height: 220 }
          },
          (decodedText) => {
            handleQrSuccess(decodedText);
          },
          () => {}
        );

        showStatus("Камер нээгдлээ. QR кодоо уншуулна уу.");
      } catch (err) {
        console.error(err);
        showStatus("Камер нээж чадсангүй. Browser permission-оо шалгана уу.");
      }
    }

    async function stopScanner() {
      if (!scanner) return;

      try {
        await scanner.stop();
        await scanner.clear();
      } catch (err) {
        console.warn("Scanner stop warning:", err);
      } finally {
        scanner = null;
      }
    }

    async function handleQrSuccess(decodedText) {
      scannedText = decodedText;
      resultEl.value = decodedText;
      showStatus("QR амжилттай уншигдлаа. Форм руу шилжүүлж байна...");

      await stopScanner();

      const targetUrl = buildTallyUrl(decodedText);

      setTimeout(() => {
        window.location.href = targetUrl;
      }, 700);
    }

    btnManual.addEventListener("click", () => {
      window.location.href = MANUAL_FORM_URL;
    });

    btnQr.addEventListener("click", () => {
      showQrView();
    });

    btnStartScan.addEventListener("click", () => {
      startScanner();
    });

    btnStopScan.addEventListener("click", () => {
      stopScanner();
      showStatus("Уншилт зогслоо.");
    });

    btnBack.addEventListener("click", () => {
      showHome();
    });

    window.addEventListener("beforeunload", () => {
      stopScanner();
    });
  </script>
</body>
</html>
